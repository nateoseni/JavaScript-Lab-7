<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lab 7</title>
</head>
<body>

    <section>
        <button id="btn">Click Me</button>
        <p id="clickMessage"></p>
    </section>

    <section>
        <input type="text" id="keyboardInput" placeholder="Type something...">
        <p>Input entered: <span id="inputDisplay"></span></p>
    </section>

    <section>
        <form id ="myForm">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Submit</button>
        </form>
        <p id="formMessage"></p>
    </section>
 
    <section>
        <input type="text" id="focusInput" placeholder="Click to focus...">
        <p id="focusMessage"></p>
    </section>

    <section>   
        <div id="btnContainer" class="eventContainer">
            <button>Button</button>
            <button>Another Button</button>
            <button>Yet Another Button</button>
        </div>
        <p>Clicked button: <span id="eventMessage"></span></p>
    </section>
    <script src="script.js"></script>
</body>
</html>
